<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Learning Journal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:#121826;
  --accent:#00e5c0;
  --text:#e5e7eb;
  --muted:#6b7280;
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text)}

.container{max-width:1000px;margin:auto;padding:20px}

h1{font-size:2.5rem;margin-bottom:10px}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  background:#0f172a;
  border:1px solid #1f2937;
  color:white;
  border-radius:6px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

.week{
  border-left:4px solid var(--accent);
  padding-left:10px;
  margin-bottom:15px;
}

.progress{
  height:8px;
  background:#1f2937;
  border-radius:5px;
  overflow:hidden;
  margin-bottom:20px;
}

.progress div{
  height:100%;
  background:var(--accent);
}
</style>
</head>

<body>
<div class="container">

<h1>IoT Learning Journal</h1>

<div class="card">
<h3>Profile</h3>
<input id="name" placeholder="Victor Mulinge">
<textarea id="about" placeholder="I'm a final year student currently pursuing Electrical & Electronics Engineering at UoN.
I'm also part of the Gearbox IoT & Embedded Systems class."></textarea>
</div>

<div class="card">
<h3>Progress</h3>
<div class="progress"><div id="bar" style="width:0%"></div></div>
<div id="weeks"></div>
</div>

<div class="card">
<h3>Capstone Project</h3>
<input id="project" placeholder="Smart Surveillance and Access Control System">
<textarea id="desc" placeholder="This project is a smart surveillance and access control system built to provide high-quality security at a price point that actually works for people. By using affordable hardware like Raspberry Pi or ESP32 controllers, solenoid locks, and even repurposed webcams, it delivers professional-grade protection without the massive market markup. Imagine being able to leave your heavy luggage in a secure locker room in the CBD, knowing it's protected by RFID or facial recognition, while you go about your business freely? I'm sure some people who leave their items at supermarkets would not feel the need to anymore. Whether it’s for these urban locker hubs, home security, or e-commerce delivery points, this project aims to make safety and convenience accessible to everyone. It bridges the gap between expensive proprietary systems and local needs, offering a remotely-accessible platform that proves security doesn't have to be a luxury.
"></textarea>
</div>

</div>

<script>
// Safe load (prevents JSON.parse crash if empty)
function getLocalData(){
  try{
    return JSON.parse(localStorage.getItem("iot-simple")) || null;
  }catch(e){
    return null;
  }
}

let data = window.__IOT_DATA__ || getLocalData() || {
  name:"",
  about:"",
  project:"",
  desc:"",
  weeks:Array.from({length:14},(_,i)=>({topic:"Week "+(i+1),done:false}))
};

function render(){
  document.getElementById("name").value=data.name;
  document.getElementById("about").value=data.about;
  document.getElementById("project").value=data.project;
  document.getElementById("desc").value=data.desc;

  let weeksDiv=document.getElementById("weeks");
  weeksDiv.innerHTML="";

  let done=0;

  data.weeks.forEach((w,i)=>{
    if(w.done) done++;

    let div=document.createElement("div");
    div.className="week";
    div.innerHTML=`
      <input value="${w.topic}" onchange="update(${i},'topic',this.value)">
      <label>
        <input type="checkbox" ${w.done?"checked":""} onchange="update(${i},'done',this.checked)">
        Completed
      </label>
    `;
    weeksDiv.appendChild(div);
  });

  document.getElementById("bar").style.width=(done/14*100)+"%";
}

function update(i,key,val){
  data.weeks[i][key]=val;
  autoSave();
  render();
}

function save(){
  data.name=document.getElementById("name").value;
  data.about=document.getElementById("about").value;
  data.project=document.getElementById("project").value;
  data.desc=document.getElementById("desc").value;

  localStorage.setItem("iot-simple",JSON.stringify(data));
}

let timer;
function autoSave(){
  clearTimeout(timer);
  timer=setTimeout(save,500);
}

render();
</script>

</body>
</html>
